<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cave à Vin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --burgundy: #6B2D3E;
    --burgundy-light: #8B4455;
    --burgundy-pale: #F5EDEE;
    --gold: #C4A456;
    --gold-light: #E8D5A0;
    --cream: #FAF7F2;
    --cream-dark: #F0EBE3;
    --ink: #1C1410;
    --ink-mid: #4A3728;
    --ink-muted: #8B7355;
    --white: #FFFFFF;
    --border: rgba(100,60,40,0.15);
    --border-strong: rgba(100,60,40,0.3);
    --shadow: 0 2px 12px rgba(28,20,16,0.08);
    --shadow-md: 0 4px 24px rgba(28,20,16,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--burgundy);
    color: var(--cream);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(28,20,16,0.25);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 32px;
    height: 32px;
  }
  .logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--gold-light);
  }
  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .stat-pill {
    font-size: 12px;
    font-weight: 400;
    color: rgba(250,247,242,0.7);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .stat-pill span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--gold-light);
    margin-right: 4px;
  }

  /* MAIN */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* TABS */
  .tabs-container {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
    overflow-x: auto;
  }
  .tab-btn {
    background: none;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink-muted);
    cursor: pointer;
    padding: 0.5rem 1rem;
    position: relative;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--burgundy); }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -0.5rem;
    left: 0;
    width: 100%;
    height: 2px;
    background: var(--burgundy);
  }

  /* FILTERS BAR */
  .filters-bar {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    stroke: var(--ink-muted);
    fill: none;
    stroke-width: 2;
  }
  input[type="text"], input[type="date"], input[type="number"], select, textarea {
    padding: 9px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    background: var(--cream);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input[type="text"] {
    width: 100%;
    padding-left: 36px;
  }
  input[type="text"]:focus, input[type="date"]:focus, input[type="number"]:focus, select:focus, textarea:focus { 
    border-color: var(--burgundy-light); 
  }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 20px;
    background: transparent;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.02em;
  }
  .filter-btn:hover { border-color: var(--burgundy-light); color: var(--burgundy); background: var(--burgundy-pale); }
  .filter-btn.active {
    background: var(--burgundy);
    border-color: var(--burgundy);
    color: var(--cream);
  }
  .filter-sep {
    width: 1px;
    height: 28px;
    background: var(--border);
    align-self: center;
  }

  /* SORT ROW */
  .sort-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .results-count {
    font-size: 13px;
    color: var(--ink-muted);
    font-weight: 300;
  }
  .results-count strong { color: var(--ink-mid); font-weight: 500; }
  .sort-select {
    padding: 6px 10px;
    background: var(--white);
    cursor: pointer;
  }

  /* BOTTLE GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .bottle-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, transform 0.2s;
    cursor: default;
    position: relative;
  }
  .bottle-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .wine-type-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .dot-rouge { background: #7B2D35; }
  .dot-blanc { background: #C4A456; }
  .dot-rose { background: #E07A8A; }
  .dot-mousseux { background: #7AA8C4; }

  .wine-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.25;
    color: var(--ink);
    flex: 1;
    margin: 0 10px 0 8px;
  }
  .card-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .bottle-card:hover .card-actions { opacity: 1; }
  .btn-icon {
    width: 30px;
    height: 30px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .btn-icon:hover { background: var(--cream-dark); }
  .btn-icon.consume:hover { background: #FFF0F0; border-color: #C0392B; }
  .btn-icon.edit:hover { background: var(--burgundy-pale); border-color: var(--burgundy-light); }
  .btn-icon svg { width: 14px; height: 14px; fill: none; stroke: var(--ink-mid); stroke-width: 2; }
  .btn-icon.consume svg { stroke: #C0392B; }
  .btn-icon.edit svg { stroke: var(--burgundy); }

  .card-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .badge {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .badge-type-rouge { background: #F5E8EA; color: #7B2D35; }
  .badge-type-blanc { background: #FBF6E8; color: #7A5C1A; }
  .badge-type-rose { background: #FCEEF0; color: #8B3545; }
  .badge-type-mousseux { background: #E8F2F8; color: #1E5C80; }
  .badge-arome { background: var(--cream-dark); color: var(--ink-muted); }
  .badge-region { background: var(--cream-dark); color: var(--ink-muted); }

  .card-details {
    font-size: 13px;
    color: var(--ink-muted);
    line-height: 1.6;
  }
  .card-details .row {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 8px;
  }
  .card-details .label { font-weight: 400; }
  .card-details .value { color: var(--ink-mid); font-weight: 500; }

  .pairings {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .pairing-tag {
    font-size: 11px;
    padding: 2px 7px;
    background: var(--gold-light);
    color: var(--ink-mid);
    border-radius: 3px;
  }

  .qty-badge {
    position: absolute;
    top: -8px;
    right: 12px;
    background: var(--burgundy);
    color: var(--cream);
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
  }
  .qty-badge.low { background: #C0392B; }
  .qty-badge.aging { background: var(--gold); color: var(--ink); }

  /* HISTORY LIST */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .history-item {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow);
  }
  .history-info .wine-name { 
    font-family: 'Cormorant Garamond', serif; 
    font-size: 20px; 
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .history-date { 
    font-size: 14px; 
    color: var(--ink-muted); 
    text-align: right;
  }

  /* STATS SECTION */
  .stats-controls {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 2rem;
    box-shadow: var(--shadow);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .chart-container {
    max-width: 500px;
    margin: 0 auto;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    box-shadow: var(--shadow);
  }

  /* STATS LEGEND LIST */
  .chart-legend-list {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .legend-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 15px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
  }
  .legend-label-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .legend-color-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-value {
    font-weight: 500;
    color: var(--ink-mid);
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--ink-muted);
    grid-column: 1 / -1;
  }
  .empty svg { width: 48px; height: 48px; stroke: var(--border-strong); fill: none; stroke-width: 1; margin-bottom: 1rem; }
  .empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--ink-mid); margin-bottom: 6px; }
  .empty p { font-size: 14px; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--burgundy);
    color: var(--cream);
    border: none;
    border-radius: 50px;
    padding: 14px 24px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(107,45,62,0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    z-index: 99;
    letter-spacing: 0.02em;
  }
  .fab:hover { background: var(--burgundy-light); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(107,45,62,0.5); }
  .fab svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }

  /* MODAL OVERLAY */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,20,16,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(28,20,16,0.25);
    position: relative;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .close-btn {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    width: 32px;
    height: 32px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .close-btn:hover { background: var(--cream-dark); }
  .close-btn svg { width: 14px; height: 14px; fill: none; stroke: var(--ink-mid); stroke-width: 2; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
  }
  
  .pairing-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .pairing-chip {
    padding: 5px 10px;
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    color: var(--ink-mid);
    background: transparent;
    font-family: 'Jost', sans-serif;
    transition: all 0.15s;
  }
  .pairing-chip:hover { background: var(--gold-light); border-color: var(--gold); }
  .pairing-chip.selected { background: var(--gold); border-color: var(--gold); color: var(--ink); font-weight: 500; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .btn-secondary {
    padding: 9px 18px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: transparent;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    color: var(--ink-mid);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: var(--cream-dark); }
  .btn-primary {
    padding: 9px 22px;
    background: var(--burgundy);
    border: none;
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--cream);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--burgundy-light); }

  /* PASSWORD MODAL */
  .pwd-notice {
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 1rem;
    line-height: 1.6;
  }
  .pwd-error {
    color: #C0392B;
    font-size: 13px;
    margin-top: 6px;
    display: none;
  }

  /* CONFIRM MODAL */
  .confirm-text {
    font-size: 15px;
    color: var(--ink-mid);
    margin-bottom: 1rem;
    line-height: 1.6;
  }
  .btn-danger {
    padding: 9px 22px;
    background: #C0392B;
    border: none;
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: white;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-danger:hover { background: #A93226; }

  /* EXPORT/IMPORT */
  .util-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .btn-util {
    padding: 7px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: var(--white);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    color: var(--ink-mid);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .btn-util:hover { background: var(--cream-dark); }
  .btn-util svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 5rem;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--ink);
    color: var(--cream);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* AGING INDICATOR */
  .aging-note {
    font-size: 12px;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
  }
  .aging-note svg { width: 12px; height: 12px; fill: none; stroke: var(--gold); stroke-width: 2; }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .header-stats { display: none; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect x="12" y="2" width="8" height="8" rx="1" fill="#C4A456"/>
        <rect x="10.5" y="10" width="11" height="4" rx="1.5" fill="#FAF7F2"/>
        <rect x="11.5" y="14" width="9" height="10" fill="#FAF7F2"/>
        <path d="M11.5 23 C 6 27, 5 30, 5 32 L 27 32 C 27 30, 26 27, 20.5 23 Z" fill="#FAF7F2"/>
      </svg>
      <span class="logo-text">Cave à Vin d'Axel</span>
    </div>
    <div class="header-stats">
      <div class="stat-pill"><span id="stat-total">0</span> bouteilles</div>
      <div class="stat-pill"><span id="stat-regions">0</span> régions</div>
      <div class="stat-pill"><span id="stat-aging">0</span> en garde</div>
    </div>
  </div>
</header>

<main>
  <div class="tabs-container">
    <button class="tab-btn active" id="tab-cave" onclick="showView('cave')">Ma Cave</button>
    <button class="tab-btn" id="tab-stats" onclick="showView('stats')">Statistiques</button>
    <button class="tab-btn" id="tab-history" onclick="requireAuth(() => showView('history'))">Historique</button>
  </div>

  <div class="util-row">
    <button class="btn-util" onclick="exportData()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exporter vers OneDrive
    </button>
    <label class="btn-util" style="cursor:pointer">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Importer depuis OneDrive
      <input type="file" accept=".json" style="display:none" onchange="importData(event)">
    </label>
  </div>

  <div id="view-cave">
    <div class="filters-bar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Chercher par nom, domaine, millésime, pays…" oninput="renderBottles()">
      </div>
      <div class="filter-sep"></div>
      <div class="filter-group" id="type-filters">
        <button class="filter-btn active" onclick="setFilter('type','tous')">Tous</button>
        <button class="filter-btn" onclick="setFilter('type','rouge')">Rouge</button>

        <select id="stat-primary" onchange="renderChart()">

  <div id="view-history" style="display:none;">

  </div>

</main>

<div class="toast" id="toast"></div>

<script>
const PAIRINGS_OPTIONS = ['Viande rouge','Viande blanche','Gibier','Poisson','Fruits de mer','Fromage','Charcuterie','Volaille','Veau','Agneau','Champignons','Risotto','Dessert','Apéritif'];
const DEFAULT_PASSWORD = 'papa';
const STORAGE_KEY = 'cave_bouteilles';
const HIST_STORAGE_KEY = 'cave_historique';
const PWD_SESSION_KEY = 'cave_auth';

let bottles = [];
let historyData = [];
let filters = { type: 'tous', arome: 'tous' };
let pendingAction = null;
let pieChartInstance = null; // Pour stocker l'instance du graphique

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  bottles = raw ? JSON.parse(raw) : getSampleData();
  
  const rawHist = localStorage.getItem(HIST_STORAGE_KEY);
  historyData = rawHist ? JSON.parse(rawHist) : [];
  
  save();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(bottles));
  localStorage.setItem(HIST_STORAGE_KEY, JSON.stringify(historyData));
}

function isAuth() {
  return sessionStorage.getItem(PWD_SESSION_KEY) === '1';
}

function requireAuth(cb) {
  if (isAuth()) { cb(); return; }
  pendingAction = cb;
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-error').style.display = 'none';
  openModal('modal-pwd');
}

function checkPassword() {
  const val = document.getElementById('pwd-input').value;
  const stored = localStorage.getItem('cave_pwd') || DEFAULT_PASSWORD;
  if (val === stored) {
    sessionStorage.setItem(PWD_SESSION_KEY, '1');
    closeModal('modal-pwd');
    if (pendingAction) { pendingAction(); pendingAction = null; }
  } else {
    document.getElementById('pwd-error').style.display = 'block';
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// VIEW TOGGLING (CAVE / STATS / HISTORY)
function showView(view) {
  const views = ['cave', 'stats', 'history'];
  views.forEach(v => {
    document.getElementById('tab-' + v).classList.remove('active');
    document.getElementById('view-' + v).style.display = 'none';
  });
  
  document.getElementById('tab-' + view).classList.add('active');
  document.getElementById('view-' + view).style.display = 'block';

  if (view === 'cave') { 
    document.getElementById('fab-add').style.display = 'flex'; 
    renderBottles(); 
  } else if (view === 'history') { 
    document.getElementById('fab-add').style.display = 'none'; 
    renderHistory(); 
  } else if (view === 'stats') {
    document.getElementById('fab-add').style.display = 'none'; 
    renderChart();
  }
}

function setFilter(key, val) {
  filters[key] = val;
  const groupId = key === 'type' ? 'type-filters' : 'arome-filters';
  document.querySelectorAll('#' + groupId + ' .filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderBottles();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return bottles.filter(b => {
    if (filters.type !== 'tous' && b.type !== filters.type) return false;
    if (filters.arome !== 'tous' && b.arome !== filters.arome) return false;
    if (q) {
      const hay = [b.name, b.producer, b.country, b.region, b.appellation, String(b.year)].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function getSorted(arr) {
  const s = document.getElementById('sort-select').value;
  return [...arr].sort((a, b) => {
    if (s === 'name') return a.name.localeCompare(b.name, 'fr');
    if (s === 'year-asc') return (a.year || 0) - (b.year || 0);
    if (s === 'year-desc') return (b.year || 0) - (a.year || 0);
    if (s === 'region') return (a.region || '').localeCompare(b.region || '', 'fr');
    if (s === 'qty') return b.qty - a.qty;
    return 0;
  });
}

function renderBottles() {
  const filtered = getSorted(getFiltered());
  const grid = document.getElementById('grid');
  const count = document.getElementById('results-count');
  count.innerHTML = `<strong>${filtered.length}</strong> résultat${filtered.length !== 1 ? 's' : ''}`;

  updateStats();
  updateDatalists();

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">
      <svg viewBox="0 0 48 48"><path d="M18 4 C18 4 12 12 12 21 C12 27.6 15.9 33 21 35.1 L21 45 L27 45 L27 35.1 C32.1 33 36 27.6 36 21 C36 12 30 4 30 4 Z"/></svg>
      <h3>Aucune bouteille trouvée</h3>
      <p>Modifiez vos filtres ou ajoutez de nouvelles bouteilles.</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(b => {
    const typeClass = 'dot-' + b.type.replace('é','e');
    const badgeClass = 'badge-type-' + b.type.replace('é','e');
    const currentYear = new Date().getFullYear();
    const isAging = b.agingUntil && b.agingUntil > currentYear;
    const agingDone = b.agingUntil && b.agingUntil <= currentYear;
    const qtyClass = b.qty <= 1 ? 'low' : isAging ? 'aging' : '';

    return `<div class="bottle-card">
      <span class="qty-badge ${qtyClass}">×${b.qty}</span>
      <div class="card-header">
        <div class="wine-type-dot ${typeClass}"></div>
        <div class="wine-name">${esc(b.name)}</div>
        <div class="card-actions">
          <button class="btn-icon edit" title="Modifier" onclick="openEditModal('${b.id}')">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon consume" title="Consommer" onclick="askConsume('${b.id}')">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </button>
        </div>
      </div>
      <div class="card-meta">
        <span class="badge ${badgeClass}">${b.type}</span>
        ${b.arome ? `<span class="badge badge-arome">${b.arome}</span>` : ''}
        ${b.region || b.country ? `<span class="badge badge-region">${esc(b.region || '')} ${b.country ? '('+esc(b.country)+')' : ''}</span>` : ''}
      </div>
      <div class="card-details">
        ${b.producer ? `<div style="font-size:13px;color:var(--ink-mid);margin-bottom:4px;font-style:italic">${esc(b.producer)}</div>` : ''}
        ${b.appellation ? `<div style="font-size:12px;color:var(--ink-muted);margin-bottom:6px">${esc(b.appellation)}</div>` : ''}
        ${(b.year || b.purchaseDate) ? `<div class="row">
          ${b.year ? `<span class="label">Millésime</span><span class="value">${b.year}</span>` : ''}
        </div>` : ''}
        ${b.purchaseDate ? `<div class="row"><span class="label">Acheté le</span><span class="value">${formatDate(b.purchaseDate)}</span></div>` : ''}
        ${isAging ? `<div class="aging-note"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>À garder jusqu'en ${b.agingUntil}</div>` : ''}
        ${agingDone ? `<div class="aging-note" style="color:#5B8C5A"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Prêt à boire !</div>` : ''}
        ${b.notes ? `<div style="font-size:12px;color:var(--ink-muted);margin-top:8px;font-style:italic;line-height:1.5">${esc(b.notes)}</div>` : ''}
      </div>
      ${b.pairings && b.pairings.length ? `<div class="pairings">${b.pairings.map(p => `<span class="pairing-tag">${esc(p)}</span>`).join('')}</div>` : ''}
    </div>`;
  }).join('');
}

function renderHistory() {
  const container = document.getElementById('history-container');
  if (historyData.length === 0) {
    container.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <h3>Aucun historique</h3>
      <p>Vous n'avez pas encore consommé de bouteilles.</p>
    </div>`;
    return;
  }
  
  const sorted = [...historyData].sort((a, b) => new Date(b.consumedDate) - new Date(a.consumedDate));
  
  container.innerHTML = `<div class="history-list">` + sorted.map(b => `
    <div class="history-item">
      <div class="history-info">
        <div class="wine-name">${esc(b.name)} <span style="font-weight:400; font-size:16px; color:var(--ink-muted)">${b.year || ''}</span></div>
        <div style="font-size:14px; color:var(--ink-muted); margin-top:4px">${esc(b.appellation || b.region || 'Région non précisée')} • ${b.type}</div>
      </div>
      <div class="history-date">
        Consommée le <br><strong>${formatDate(b.consumedDate)}</strong>
      </div>
    </div>
  `).join('') + `</div>`;
}

// LOGIQUE DES STATISTIQUES (CHART.JS)
function renderChart() {
  const primary = document.getElementById('stat-primary').value;
  const secondary = document.getElementById('stat-secondary').value;

  // Calcul des données
  const dataMap = {};
  bottles.forEach(b => {
    let key1 = b[primary] ? b[primary].charAt(0).toUpperCase() + b[primary].slice(1) : 'Non renseigné';
    let label = key1;

    if (secondary !== 'none') {
      if (primary !== secondary) {
        let key2 = b[secondary] ? b[secondary].charAt(0).toUpperCase() + b[secondary].slice(1) : 'Non renseigné';
        label = `${key1} - ${key2}`;
      }
    }
    
    dataMap[label] = (dataMap[label] || 0) + (b.qty || 1);
  });

  // TRI PAR ORDRE DECROISSANT DE TAILLE
  const sortedData = Object.entries(dataMap)
    .map(([label, count]) => ({ label, count }))
    .sort((a, b) => b.count - a.count);

  const labels = sortedData.map(item => item.label);
  const data = sortedData.map(item => item.count);

  const bgColors = [
    '#6B2D3E', '#C4A456', '#4A3728', '#8B7355', '#E8D5A0', '#8B4455', '#E07A8A', '#7AA8C4', '#F0EBE3'
  ];
  
  const finalColors = bgColors.slice(0, labels.length).concat(Array(Math.max(0, labels.length - bgColors.length)).fill('#CCCCCC'));

  if (pieChartInstance) {
    pieChartInstance.destroy();
  }

  const ctx = document.getElementById('myPieChart').getContext('2d');
  pieChartInstance = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: finalColors,
        borderWidth: 2,
        borderColor: '#ffffff'
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: false
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              let label = context.label || '';
              if (label) label += ' : ';
              
              // CALCUL DU POURCENTAGE DANS L'INFOBULLE
              const value = context.raw;
              const total = context.dataset.data.reduce((a, b) => a + b, 0);
              const percentage = Math.round((value / total) * 100);
              
              label += `${value} bouteille(s) (${percentage}%)`;
              return label;
            }
          }
        }
      }
    }
  });

  const legendContainer = document.getElementById('chart-legend-list');
  legendContainer.innerHTML = ''; 
  
  if (labels.length === 0) {
    legendContainer.innerHTML = '<p style="text-align:center; color:var(--ink-muted);">Aucune donnée à afficher.</p>';
    return;
  }

  // CALCUL DU POURCENTAGE DANS LA LISTE DE LEGENDE
  const totalBottles = data.reduce((a, b) => a + b, 0);

  labels.forEach((label, index) => {
    const val = data[index];
    const color = finalColors[index];
    const pct = Math.round((val / totalBottles) * 100);
    
    legendContainer.innerHTML += `
      <div class="legend-item">
        <div class="legend-label-group">
          <div class="legend-color-dot" style="background-color: ${color}"></div>
          <span>${esc(label)}</span>
        </div>
        <span class="legend-value">${val} bouteille${val > 1 ? 's' : ''} (${pct}%)</span>
      </div>
    `;
  });
}

function updateStats() {
  document.getElementById('stat-total').textContent = bottles.reduce((s,b) => s + (b.qty||1), 0);
  document.getElementById('stat-regions').textContent = new Set(bottles.map(b => b.region).filter(Boolean)).size;
  const now = new Date().getFullYear();
  document.getElementById('stat-aging').textContent = bottles.filter(b => b.agingUntil && b.agingUntil > now).length;
}

function updateDatalists() {
  const regions = [...new Set(bottles.map(b => b.region).filter(Boolean))];
  document.getElementById('regions-list').innerHTML = regions.map(r => `<option value="${esc(r)}">`).join('');
  
  const countries = [...new Set(bottles.map(b => b.country).filter(Boolean))];
  document.getElementById('countries-list').innerHTML = countries.map(c => `<option value="${esc(c)}">`).join('');
}

function openAddModal() {
  requireAuth(() => {
    document.getElementById('edit-id').value = '';
    document.getElementById('modal-add-title').textContent = 'Ajouter une bouteille';
    clearForm();
    openModal('modal-add');
  });
}

function openEditModal(id) {
  requireAuth(() => {
    const b = bottles.find(x => x.id === id);
    if (!b) return;
    document.getElementById('edit-id').value = id;
    document.getElementById('modal-add-title').textContent = 'Modifier la bouteille';
    document.getElementById('f-name').value = b.name || '';
    document.getElementById('f-producer').value = b.producer || '';
    document.getElementById('f-country').value = b.country || '';
    document.getElementById('f-region').value = b.region || '';
    document.getElementById('f-appellation').value = b.appellation || '';
    document.getElementById('f-type').value = b.type || 'rouge';
    document.getElementById('f-arome').value = b.arome || 'sec';
    document.getElementById('f-year').value = b.year || '';
    document.getElementById('f-qty').value = b.qty || 1;
    document.getElementById('f-date').value = b.purchaseDate || '';
    document.getElementById('f-aging').value = b.agingUntil || '';
    document.getElementById('f-notes').value = b.notes || '';
    renderPairingChips(b.pairings || []);
    openModal('modal-add');
  });
}

function clearForm() {
  ['f-name','f-producer','f-country','f-region','f-appellation','f-year','f-date','f-aging','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-qty').value = 1;
  document.getElementById('f-type').value = 'rouge';
  document.getElementById('f-arome').value = 'sec';
  renderPairingChips([]);
}

function renderPairingChips(selected) {
  document.getElementById('pairing-chips').innerHTML = PAIRINGS_OPTIONS.map(p =>
    `<button type="button" class="pairing-chip ${selected.includes(p) ? 'selected' : ''}" onclick="togglePairing(this,'${p}')">${p}</button>`
  ).join('');
}
function togglePairing(el, val) { el.classList.toggle('selected'); }

function saveBottle() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Le nom du vin est requis.'); return; }
  const selectedPairings = [...document.querySelectorAll('#pairing-chips .pairing-chip.selected')].map(el => el.textContent);
  const data = {
    name,
    producer: document.getElementById('f-producer').value.trim(),
    country: document.getElementById('f-country').value.trim(),
    region: document.getElementById('f-region').value.trim(),
    appellation: document.getElementById('f-appellation').value.trim(),
    type: document.getElementById('f-type').value,
    arome: document.getElementById('f-arome').value,
    year: parseInt(document.getElementById('f-year').value) || null,
    qty: parseInt(document.getElementById('f-qty').value) || 1,
    purchaseDate: document.getElementById('f-date').value || null,
    agingUntil: parseInt(document.getElementById('f-aging').value) || null,
    notes: document.getElementById('f-notes').value.trim(),
    pairings: selectedPairings,
  };
  const editId = document.getElementById('edit-id').value;
  if (editId) {
    const idx = bottles.findIndex(b => b.id === editId);
    if (idx !== -1) bottles[idx] = { ...bottles[idx], ...data };
    showToast('Bouteille modifiée.');
  } else {
    data.id = 'b' + Date.now();
    bottles.push(data);
    showToast('Bouteille ajoutée !');
  }
  save();
  closeModal('modal-add');
  
  if (document.getElementById('tab-stats').classList.contains('active')) {
    renderChart();
  } else {
    renderBottles();
  }
}

let consumeTarget = null;
function askConsume(id) {
  requireAuth(() => {
    consumeTarget = id;
    const b = bottles.find(x => x.id === id);
    if (!b) return;
    document.getElementById('confirm-text').textContent = `Vous êtes sur le point de retirer une unité de "${b.name}" (${b.year || '?'}). S'il ne reste qu'une bouteille, elle sera supprimée de la cave.`;
    document.getElementById('consume-date').value = new Date().toISOString().split('T')[0];
    openModal('modal-confirm');
  });
}

function confirmConsume() {
  const b = bottles.find(x => x.id === consumeTarget);
  if (!b) return;
  
  const cDate = document.getElementById('consume-date').value || new Date().toISOString().split('T')[0];
  
  historyData.push({
    ...b,
    consumedDate: cDate,
    historyId: 'h' + Date.now()
  });

  if (b.qty > 1) { 
    b.qty--; 
    showToast(`Une bouteille de ${b.name} consommée. Il en reste ${b.qty}.`); 
  } else { 
    bottles = bottles.filter(x => x.id !== consumeTarget); 
    showToast(`${b.name} retiré de la cave.`); 
  }
  
  save();
  closeModal('modal-confirm');
  renderBottles();
}

function exportData() {
  const dataToExport = {
    bottles: bottles,
    history: historyData
  };
  const json = JSON.stringify(dataToExport, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cave_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export téléchargé — sauvegardez-le sur OneDrive.');
}

function importData(e) {
  requireAuth(() => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const data = JSON.parse(evt.target.result);
        
        if (Array.isArray(data)) {
          bottles = data;
          historyData = [];
        } else if (data.bottles) {
          bottles = data.bottles;
          historyData = data.history || [];
        } else {
          throw new Error();
        }
        
        save();
        
        if (document.getElementById('tab-history').classList.contains('active')) {
          renderHistory();
        } else if (document.getElementById('tab-stats').classList.contains('active')) {
          renderChart();
        } else {
          renderBottles();
        }
        
        showToast(`Données importées avec succès.`);
      } catch { showToast('Fichier invalide.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
